# =============================================================================
# tmux.conf
# =============================================================================

# --- Prefix: Ctrl+A ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on

# --- Mouse ---
set -g mouse on

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Config reloaded"

# --- Split panes ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navigasi pane (Vim keys) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Resize pane ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window navigation ---
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# --- Copy mode (Vim style) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- Status bar ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#585b70]│ "
set -g status-right "#[fg=#585b70]│ #[fg=#a6e3a1]%H:%M #[fg=#585b70]│ #[fg=#cdd6f4] #h "
setw -g window-status-format         "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'
